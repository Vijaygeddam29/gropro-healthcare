<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GroPro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;">
                <span class="brand-icon">+</span>
                <span class="brand-text">GroPro</span>
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Sign In</h2>
            <p>Access your GroPro wealth dashboard</p>
            {% if error %}
            <p style="color:var(--black);font-size:13px;margin-bottom:16px;padding:10px;border:1px solid var(--black);">{{ error }}</p>
            {% endif %}
            <form class="auth-form" action="/auth/login" method="post">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="doctor@nhs.net" required data-testid="input-email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required data-testid="input-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" data-testid="button-login">Sign In</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="/auth/register" data-testid="link-register">Register</a></p>
        </div>
    </div>
</body>
</html>
